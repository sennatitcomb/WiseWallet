<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseWallet - Smart Receipt & Price Forecasting</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .icon { display: inline-block; margin-right: 0.5em; font-size: 1.2em; }
        .forecast-card { border-left: 4px solid #10b981; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const WiseWallet = () => {
            const [receipts, setReceipts] = useState([]);
            const [items, setItems] = useState([]);
            const [filteredReceipts, setFilteredReceipts] = useState([]);
            const [view, setView] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('all');
            const [filterStore, setFilterStore] = useState('all');
            const [dateRange, setDateRange] = useState({ start: '', end: '' });
            const [priceHistory, setPriceHistory] = useState({});
            const [forecasts, setForecasts] = useState({});
            const [showDataModal, setShowDataModal] = useState(false);

            const [manualEntry, setManualEntry] = useState({
                store: '',
                date: new Date().toISOString().split('T')[0],
                total: '',
                category: 'groceries',
                items: [{ name: '', price: '', quantity: 1 }]
            });

            const categories = ['groceries', 'produce', 'dairy', 'meat', 'pantry', 'beverages', 'dining', 'utilities', 'entertainment', 'transportation', 'healthcare', 'shopping', 'other'];

            // Load data on mount
            useEffect(() => {
                loadData();
            }, []);

            // Filter receipts
            useEffect(() => {
                let filtered = [...receipts];

                if (searchTerm) {
                    filtered = filtered.filter(r => 
                        r.store.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (r.items && r.items.some(item => item.name.toLowerCase().includes(searchTerm.toLowerCase())))
                    );
                }

                if (filterCategory !== 'all') {
                    filtered = filtered.filter(r => r.category === filterCategory);
                }

                if (filterStore !== 'all') {
                    filtered = filtered.filter(r => r.store === filterStore);
                }

                if (dateRange.start) {
                    filtered = filtered.filter(r => new Date(r.date) >= new Date(dateRange.start));
                }

                if (dateRange.end) {
                    filtered = filtered.filter(r => new Date(r.date) <= new Date(dateRange.end));
                }

                setFilteredReceipts(filtered.sort((a, b) => new Date(b.date) - new Date(a.date)));
            }, [receipts, searchTerm, filterCategory, filterStore, dateRange]);

            // Load all data from localStorage
            const loadData = () => {
                try {
                    const receiptData = localStorage.getItem('receipts');
                    const itemData = localStorage.getItem('items');
                    const priceData = localStorage.getItem('priceHistory');
                    const forecastData = localStorage.getItem('forecasts');

                    if (receiptData) {
                        setReceipts(JSON.parse(receiptData));
                    } else {
                        setShowDataModal(true);
                    }

                    if (itemData) {
                        setItems(JSON.parse(itemData));
                    }

                    if (priceData) {
                        setPriceHistory(JSON.parse(priceData));
                    }

                    if (forecastData) {
                        setForecasts(JSON.parse(forecastData));
                    }
                } catch (err) {
                    console.log('Error loading data:', err);
                }
            };

            // Save all data to localStorage
            const saveData = (newReceipts, newItems) => {
                try {
                    localStorage.setItem('receipts', JSON.stringify(newReceipts));
                    localStorage.setItem('items', JSON.stringify(newItems));
                    localStorage.setItem('lastBackup', new Date().toISOString());
                } catch (err) {
                    console.error('Error saving data:', err);
                    alert('Storage limit reached. Please export and clear data.');
                }
            };

            // Load sample data from CSV
            const loadSampleData = async () => {
                try {
                    const response = await fetch('sample-data.csv');
                    const csv = await response.text();
                    const rows = csv.split('\n').map(row => row.split(','));
                    const headers = rows[0].map(h => h.trim().toLowerCase());

                    const newReceipts = [];
                    const newItems = [];
                    const newPriceHistory = {};

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length < 5 || !row[0].trim()) continue;

                        const dateIdx = headers.findIndex(h => h === 'date');
                        const storeIdx = headers.findIndex(h => h === 'store');
                        const descIdx = headers.findIndex(h => h === 'description');
                        const amountIdx = headers.findIndex(h => h === 'amount');
                        const categoryIdx = headers.findIndex(h => h === 'category');
                        const quantityIdx = headers.findIndex(h => h === 'quantity');

                        const date = row[dateIdx]?.trim() || new Date().toISOString().split('T')[0];
                        const store = row[storeIdx]?.trim() || 'Unknown';
                        const description = row[descIdx]?.trim() || 'Item';
                        const amount = parseFloat(row[amountIdx]) || 0;
                        const category = row[categoryIdx]?.trim().toLowerCase() || 'other';
                        const quantity = parseInt(row[quantityIdx]) || 1;

                        if (amount === 0) continue;

                        const receipt = {
                            id: 'sample-' + Date.now() + '-' + i,
                            store: store,
                            date: date,
                            total: amount,
                            category: category,
                            items: [{
                                name: description,
                                price: amount,
                                quantity: quantity
                            }]
                        };

                        newReceipts.push(receipt);

                        const item = {
                            name: description,
                            price: amount,
                            quantity: quantity,
                            store: store,
                            date: date,
                            category: category,
                            receiptId: receipt.id
                        };

                        newItems.push(item);

                        // Track price history
                        const key = description.toLowerCase();
                        if (!newPriceHistory[key]) {
                            newPriceHistory[key] = [];
                        }
                        newPriceHistory[key].push({
                            date: date,
                            price: amount,
                            store: store
                        });
                    }

                    setReceipts(newReceipts);
                    setItems(newItems);
                    setPriceHistory(newPriceHistory);
                    saveData(newReceipts, newItems);
                    localStorage.setItem('priceHistory', JSON.stringify(newPriceHistory));

                    // Calculate forecasts
                    calculateForecasts(newPriceHistory);
                    setShowDataModal(false);
                    alert('Sample data loaded! ' + newReceipts.length + ' transactions imported.');
                } catch (err) {
                    console.error('Error loading sample data:', err);
                    alert('Error loading sample data. Make sure sample-data.csv is in the same directory.');
                }
            };

            // Calculate price forecasts using moving average and trend analysis
            const calculateForecasts = (priceData) => {
                const newForecasts = {};

                Object.keys(priceData).forEach(itemName => {
                    const prices = priceData[itemName];
                    if (prices.length < 2) return;

                    prices.sort((a, b) => new Date(a.date) - new Date(b.date));

                    const recentPrices = prices.slice(-7).map(p => p.price);
                    const avgPrice = recentPrices.reduce((a, b) => a + b, 0) / recentPrices.length;

                    const firstHalf = recentPrices.slice(0, Math.ceil(recentPrices.length / 2));
                    const secondHalf = recentPrices.slice(Math.ceil(recentPrices.length / 2));
                    const avgFirst = firstHalf.reduce((a, b) => a + b, 0) / firstHalf.length;
                    const avgSecond = secondHalf.reduce((a, b) => a + b, 0) / secondHalf.length;
                    const trend = avgSecond > avgFirst ? 'up' : avgSecond < avgFirst ? 'down' : 'stable';

                    const variance = recentPrices.reduce((sum, p) => sum + Math.pow(p - avgPrice, 2), 0) / recentPrices.length;
                    const volatility = Math.sqrt(variance);
                    const volatilityPercent = (volatility / avgPrice) * 100;

                    const trendFactor = trend === 'up' ? 1.02 : trend === 'down' ? 0.98 : 1.0;
                    const forecastedPrice = avgPrice * trendFactor;

                    newForecasts[itemName] = {
                        current: avgPrice,
                        forecasted: forecastedPrice,
                        trend: trend,
                        volatility: volatilityPercent,
                        confidence: Math.min(prices.length * 10, 95),
                        lastUpdate: new Date().toISOString()
                    };
                });

                setForecasts(newForecasts);
                localStorage.setItem('forecasts', JSON.stringify(newForecasts));
            };

            // Handle manual receipt submission
            const handleManualSubmit = (e) => {
                e.preventDefault();

                const newReceipt = {
                    id: Date.now().toString(),
                    store: manualEntry.store,
                    date: manualEntry.date,
                    category: manualEntry.category,
                    total: parseFloat(manualEntry.total),
                    items: manualEntry.items.map(item => ({
                        name: item.name,
                        price: parseFloat(item.price),
                        quantity: parseInt(item.quantity)
                    }))
                };

                const newReceipts = [...receipts, newReceipt];
                const newItems = [...items, ...newReceipt.items.map(item => ({
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    store: newReceipt.store,
                    date: newReceipt.date,
                    category: newReceipt.category,
                    receiptId: newReceipt.id
                }))];

                const newPriceHistory = { ...priceHistory };
                newReceipt.items.forEach(item => {
                    const key = item.name.toLowerCase();
                    if (!newPriceHistory[key]) {
                        newPriceHistory[key] = [];
                    }
                    newPriceHistory[key].push({
                        date: newReceipt.date,
                        price: item.price,
                        store: newReceipt.store
                    });
                });

                setReceipts(newReceipts);
                setItems(newItems);
                setPriceHistory(newPriceHistory);
                saveData(newReceipts, newItems);
                localStorage.setItem('priceHistory', JSON.stringify(newPriceHistory));

                calculateForecasts(newPriceHistory);

                setManualEntry({
                    store: '',
                    date: new Date().toISOString().split('T')[0],
                    total: '',
                    category: 'groceries',
                    items: [{ name: '', price: '', quantity: 1 }]
                });

                setView('dashboard');
                alert('Receipt saved!');
            };

            // CSV Upload
            const handleCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n').map(row => row.split(','));
                    const headers = rows[0].map(h => h.trim().toLowerCase());

                    const newReceipts = [];
                    const newItems = [];
                    const newPriceHistory = { ...priceHistory };

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length < 2 || !row[0].trim()) continue;

                        const dateIdx = headers.findIndex(h => h.includes('date'));
                        const descIdx = headers.findIndex(h => h.includes('description') || h.includes('merchant') || h.includes('store'));
                        const amountIdx = headers.findIndex(h => h.includes('amount') || h.includes('price'));
                        const categoryIdx = headers.findIndex(h => h.includes('category'));

                        if (amountIdx === -1) continue;

                        const date = row[dateIdx] ? row[dateIdx].trim() : new Date().toISOString().split('T')[0];
                        const store = row[descIdx] ? row[descIdx].trim() : 'Unknown';
                        const amount = Math.abs(parseFloat(row[amountIdx].replace(/[^0-9.-]/g, ''))) || 0;
                        const category = row[categoryIdx] ? row[categoryIdx].trim().toLowerCase() : 'other';

                        if (amount === 0) continue;

                        const receipt = {
                            id: 'csv-' + Date.now() + '-' + i,
                            store: store,
                            date: date,
                            total: amount,
                            category: category,
                            items: [{
                                name: store,
                                price: amount,
                                quantity: 1
                            }]
                        };

                        newReceipts.push(receipt);
                        newItems.push({
                            name: receipt.items[0].name,
                            price: receipt.items[0].price,
                            quantity: receipt.items[0].quantity,
                            store: receipt.store,
                            date: receipt.date,
                            category: receipt.category,
                            receiptId: receipt.id
                        });

                        const key = store.toLowerCase();
                        if (!newPriceHistory[key]) {
                            newPriceHistory[key] = [];
                        }
                        newPriceHistory[key].push({
                            date: date,
                            price: amount,
                            store: store
                        });
                    }

                    const updatedReceipts = [...receipts, ...newReceipts];
                    const updatedItems = [...items, ...newItems];

                    setReceipts(updatedReceipts);
                    setItems(updatedItems);
                    setPriceHistory(newPriceHistory);
                    saveData(updatedReceipts, updatedItems);
                    localStorage.setItem('priceHistory', JSON.stringify(newPriceHistory));

                    calculateForecasts(newPriceHistory);

                    alert('Imported ' + newReceipts.length + ' transactions');
                };

                reader.readAsText(file);
            };

            // Add/Remove items
            const addItemRow = () => {
                setManualEntry({
                    ...manualEntry,
                    items: [...manualEntry.items, { name: '', price: '', quantity: 1 }]
                });
            };

            const updateItem = (index, field, value) => {
                const newItems = [...manualEntry.items];
                newItems[index][field] = value;
                setManualEntry({ ...manualEntry, items: newItems });
            };

            const removeItem = (index) => {
                const newItems = manualEntry.items.filter((item, i) => i !== index);
                setManualEntry({ ...manualEntry, items: newItems });
            };

            // Export/Import data
            const exportData = () => {
                const dataStr = JSON.stringify({
                    receipts: receipts,
                    items: items,
                    priceHistory: priceHistory,
                    forecasts: forecasts,
                    exportDate: new Date().toISOString()
                }, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'wisewallet-backup-' + new Date().toISOString().split('T')[0] + '.json';
                link.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        setReceipts(data.receipts || []);
                        setItems(data.items || []);
                        setPriceHistory(data.priceHistory || {});
                        setForecasts(data.forecasts || {});

                        localStorage.setItem('receipts', JSON.stringify(data.receipts || []));
                        localStorage.setItem('items', JSON.stringify(data.items || []));
                        localStorage.setItem('priceHistory', JSON.stringify(data.priceHistory || {}));
                        localStorage.setItem('forecasts', JSON.stringify(data.forecasts || {}));

                        alert('Data imported successfully!');
                    } catch (err) {
                        alert('Error importing data. Please check the file format.');
                    }
                };
                reader.readAsText(file);
            };

            // Calculate statistics
            const totalSpent = receipts.reduce((sum, r) => sum + r.total, 0);
            const avgPerReceipt = receipts.length ? totalSpent / receipts.length : 0;

            const categoryTotals = categories.map(cat => {
                const total = receipts.filter(r => r.category === cat).reduce((sum, r) => sum + r.total, 0);
                return { category: cat, total: total };
            }).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

            const uniqueStores = [...new Set(receipts.map(r => r.store))];
            const storeTotals = uniqueStores.map(store => {
                const storeReceipts = receipts.filter(r => r.store === store);
                const total = storeReceipts.reduce((sum, r) => sum + r.total, 0);
                return {
                    store: store,
                    total: total,
                    count: storeReceipts.length,
                    avg: total / storeReceipts.length
                };
            }).sort((a, b) => b.total - a.total);

            const topForecasts = Object.entries(forecasts)
                .sort(([,a], [,b]) => Math.abs(b.forecasted - b.current) - Math.abs(a.forecasted - a.current))
                .slice(0, 10);

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Navigation */}
                    <nav className="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <h1 className="text-3xl font-bold">💰 WiseWallet</h1>
                                <div className="flex space-x-2">
                                    <button
                                        onClick={() => setView('dashboard')}
                                        className={`px-4 py-2 rounded-lg font-medium transition ${view === 'dashboard' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}
                                    >
                                        <span className="icon">📊</span>Dashboard
                                    </button>
                                    <button
                                        onClick={() => setView('add')}
                                        className={`px-4 py-2 rounded-lg font-medium transition ${view === 'add' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}
                                    >
                                        <span className="icon">➕</span>Add
                                    </button>
                                    <button
                                        onClick={() => setView('forecasts')}
                                        className={`px-4 py-2 rounded-lg font-medium transition ${view === 'forecasts' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}
                                    >
                                        <span className="icon">🔮</span>Forecasts
                                    </button>
                                    <button
                                        onClick={() => setView('analysis')}
                                        className={`px-4 py-2 rounded-lg font-medium transition ${view === 'analysis' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}
                                    >
                                        <span className="icon">📈</span>Analysis
                                    </button>
                                    <button
                                        onClick={() => setView('settings')}
                                        className={`px-4 py-2 rounded-lg font-medium transition ${view === 'settings' ? 'bg-white text-blue-600' : 'hover:bg-blue-500'}`}
                                    >
                                        <span className="icon">⚙️</span>Settings
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Data Modal */}
                    {showDataModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg shadow-xl p-8 max-w-md w-full mx-4">
                                <h2 className="text-2xl font-bold mb-4">Welcome to WiseWallet</h2>
                                <p className="text-gray-600 mb-6">No data found. Would you like to load the sample data to get started?</p>
                                <div className="space-y-3">
                                    <button
                                        onClick={loadSampleData}
                                        className="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700"
                                    >
                                        Load Sample Data
                                    </button>
                                    <button
                                        onClick={() => setShowDataModal(false)}
                                        className="w-full px-4 py-3 bg-gray-200 text-gray-800 rounded-lg font-medium hover:bg-gray-300"
                                    >
                                        Start Fresh
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Dashboard View */}
                    {view === 'dashboard' && (
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            {/* Stats Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                <div className="bg-white rounded-lg shadow p-6">
                                    <div className="text-gray-600 text-sm font-medium">Total Spent</div>
                                    <div className="text-4xl font-bold text-gray-900 mt-2">${totalSpent.toFixed(2)}</div>
                                    <div className="text-xs text-gray-500 mt-2">{receipts.length} transactions</div>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <div className="text-gray-600 text-sm font-medium">Average/Receipt</div>
                                    <div className="text-4xl font-bold text-gray-900 mt-2">${avgPerReceipt.toFixed(2)}</div>
                                    <div className="text-xs text-gray-500 mt-2">per transaction</div>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <div className="text-gray-600 text-sm font-medium">Unique Stores</div>
                                    <div className="text-4xl font-bold text-gray-900 mt-2">{uniqueStores.length}</div>
                                    <div className="text-xs text-gray-500 mt-2">stores visited</div>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <div className="text-gray-600 text-sm font-medium">Price Forecasts</div>
                                    <div className="text-4xl font-bold text-blue-600 mt-2">{Object.keys(forecasts).length}</div>
                                    <div className="text-xs text-gray-500 mt-2">items tracked</div>
                                </div>
                            </div>

                            {/* Search and Filters */}
                            <div className="bg-white rounded-lg shadow p-6 mb-6">
                                <h3 className="text-lg font-semibold mb-4">Filter Transactions</h3>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Search</label>
                                        <input
                                            type="text"
                                            placeholder="Store or item..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Category</label>
                                        <select
                                            value={filterCategory}
                                            onChange={(e) => setFilterCategory(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="all">All Categories</option>
                                            {categories.filter(c => categoryTotals.find(ct => ct.category === c)).map(cat => (
                                                <option key={cat} value={cat}>{cat}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                                        <input
                                            type="date"
                                            value={dateRange.start}
                                            onChange={(e) => setDateRange({ ...dateRange, start: e.target.value })}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                                        <input
                                            type="date"
                                            value={dateRange.end}
                                            onChange={(e) => setDateRange({ ...dateRange, end: e.target.value })}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Transactions List */}
                            <div className="bg-white rounded-lg shadow overflow-hidden">
                                <div className="px-6 py-4 border-b bg-gray-50">
                                    <h2 className="text-lg font-semibold">Transactions ({filteredReceipts.length})</h2>
                                </div>
                                <div className="divide-y max-h-96 overflow-y-auto">
                                    {filteredReceipts.length === 0 ? (
                                        <div className="px-6 py-8 text-center text-gray-500">
                                            No transactions found. Add one to get started!
                                        </div>
                                    ) : (
                                        filteredReceipts.map(receipt => (
                                            <div key={receipt.id} className="px-6 py-4 hover:bg-gray-50">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <p className="font-semibold text-gray-900">{receipt.store}</p>
                                                        <p className="text-sm text-gray-600">{receipt.date}</p>
                                                        <p className="text-xs text-gray-500 mt-1">Category: <span className="font-medium">{receipt.category}</span></p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-lg font-bold text-blue-600">${receipt.total.toFixed(2)}</p>
                                                        <p className="text-xs text-gray-500">{receipt.items.length} items</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Receipt View */}
                    {view === 'add' && (
                        <div className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            <div className="bg-white rounded-lg shadow p-8">
                                <h2 className="text-2xl font-bold mb-6">Add Receipt</h2>

                                <div className="mb-8 pb-8 border-b">
                                    <label className="block text-sm font-medium text-gray-700 mb-3">Import from CSV</label>
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={handleCSVUpload}
                                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200"
                                    />
                                    <p className="text-xs text-gray-500 mt-2">Supports bank statements and credit card exports</p>
                                </div>

                                <form onSubmit={handleManualSubmit}>
                                    <h3 className="text-lg font-semibold mb-4">Manual Entry</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Store Name</label>
                                            <input
                                                type="text"
                                                value={manualEntry.store}
                                                onChange={(e) => setManualEntry({ ...manualEntry, store: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Date</label>
                                            <input
                                                type="date"
                                                value={manualEntry.date}
                                                onChange={(e) => setManualEntry({ ...manualEntry, date: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Total Amount</label>
                                            <input
                                                type="number"
                                                step="0.01"
                                                value={manualEntry.total}
                                                onChange={(e) => setManualEntry({ ...manualEntry, total: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                            <select
                                                value={manualEntry.category}
                                                onChange={(e) => setManualEntry({ ...manualEntry, category: e.target.value })}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            >
                                                {categories.map(cat => (
                                                    <option key={cat} value={cat}>{cat}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-gray-700 mb-2">Items</label>
                                        {manualEntry.items.map((item, idx) => (
                                            <div key={idx} className="flex gap-2 mb-2">
                                                <input
                                                    type="text"
                                                    placeholder="Item name"
                                                    value={item.name}
                                                    onChange={(e) => updateItem(idx, 'name', e.target.value)}
                                                    className="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                />
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    placeholder="Price"
                                                    value={item.price}
                                                    onChange={(e) => updateItem(idx, 'price', e.target.value)}
                                                    className="w-24 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                />
                                                <input
                                                    type="number"
                                                    placeholder="Qty"
                                                    value={item.quantity}
                                                    onChange={(e) => updateItem(idx, 'quantity', e.target.value)}
                                                    className="w-20 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                />
                                                {manualEntry.items.length > 1 && (
                                                    <button
                                                        type="button"
                                                        onClick={() => removeItem(idx)}
                                                        className="px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg"
                                                    >
                                                        ✕
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                        <button
                                            type="button"
                                            onClick={addItemRow}
                                            className="mt-2 px-4 py-2 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-lg border border-blue-200"
                                        >
                                            ➕ Add Item
                                        </button>
                                    </div>

                                    <button
                                        type="submit"
                                        className="w-full px-4 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700"
                                    >
                                        Save Receipt
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Forecasts View */}
                    {view === 'forecasts' && (
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            <h2 className="text-2xl font-bold mb-6">Price Forecasts & Trends</h2>
                            
                            {Object.keys(forecasts).length === 0 ? (
                                <div className="bg-white rounded-lg shadow p-8 text-center text-gray-500">
                                    <p>No forecasts yet. Add transactions to generate price predictions.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {topForecasts.map(([itemName, forecast]) => (
                                        <div key={itemName} className="bg-white rounded-lg shadow p-6 forecast-card">
                                            <h3 className="text-lg font-semibold mb-4 capitalize">{itemName}</h3>
                                            
                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                                <div>
                                                    <p className="text-gray-600 text-sm">Current Avg</p>
                                                    <p className="text-2xl font-bold text-gray-900">${forecast.current.toFixed(2)}</p>
                                                </div>
                                                <div>
                                                    <p className="text-gray-600 text-sm">Forecasted</p>
                                                    <p className="text-2xl font-bold text-blue-600">${forecast.forecasted.toFixed(2)}</p>
                                                </div>
                                            </div>

                                            <div className="mb-4 p-3 bg-gray-50 rounded-lg">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-sm font-medium text-gray-700">Trend</span>
                                                    <span className={`text-sm font-bold ${forecast.trend === 'up' ? 'text-red-600' : forecast.trend === 'down' ? 'text-green-600' : 'text-gray-600'}`}>
                                                        {forecast.trend === 'up' ? '📈 Up' : forecast.trend === 'down' ? '📉 Down' : '➡️ Stable'}
                                                    </span>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm font-medium text-gray-700">Volatility</span>
                                                    <span className="text-sm font-bold text-gray-900">{forecast.volatility.toFixed(1)}%</span>
                                                </div>
                                                <div className="flex justify-between items-center mt-2">
                                                    <span className="text-sm font-medium text-gray-700">Confidence</span>
                                                    <span className="text-sm font-bold text-blue-600">{forecast.confidence.toFixed(0)}%</span>
                                                </div>
                                            </div>

                                            <div className="text-xs text-gray-500">
                                                Updated: {new Date(forecast.lastUpdate).toLocaleDateString()}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Analysis View */}
                    {view === 'analysis' && (
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            <h2 className="text-2xl font-bold mb-6">Spending Analysis</h2>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                {/* Category Breakdown */}
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-lg font-semibold mb-4">Spending by Category</h3>
                                    <div className="space-y-3">
                                        {categoryTotals.length === 0 ? (
                                            <p className="text-gray-500">No data yet</p>
                                        ) : (
                                            categoryTotals.map(cat => (
                                                <div key={cat.category} className="flex justify-between items-center">
                                                    <span className="capitalize text-gray-700 font-medium">{cat.category}</span>
                                                    <div className="flex items-center gap-3 flex-1 ml-4">
                                                        <div className="flex-1 bg-gray-200 rounded-full h-2">
                                                            <div
                                                                className="bg-blue-600 h-2 rounded-full"
                                                                style={{ width: `${totalSpent > 0 ? (cat.total / totalSpent) * 100 : 0}%` }}
                                                            ></div>
                                                        </div>
                                                        <span className="font-semibold text-gray-900 w-24 text-right">${cat.total.toFixed(2)}</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                {/* Store Breakdown */}
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-lg font-semibold mb-4">Spending by Store</h3>
                                    <div className="space-y-3">
                                        {storeTotals.length === 0 ? (
                                            <p className="text-gray-500">No data yet</p>
                                        ) : (
                                            storeTotals.slice(0, 8).map(store => (
                                                <div key={store.store} className="flex justify-between items-center">
                                                    <div className="flex-1">
                                                        <p className="font-medium text-gray-900">{store.store}</p>
                                                        <p className="text-xs text-gray-500">{store.count} transactions • ${store.avg.toFixed(2)} avg</p>
                                                    </div>
                                                    <span className="font-semibold text-gray-900 text-right">${store.total.toFixed(2)}</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings View */}
                    {view === 'settings' && (
                        <div className="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            <div className="bg-white rounded-lg shadow p-8">
                                <h2 className="text-2xl font-bold mb-6">Settings & Data Management</h2>

                                {/* Load Sample Data */}
                                <div className="mb-8 pb-8 border-b">
                                    <h3 className="text-lg font-semibold mb-4">Load Sample Data</h3>
                                    <p className="text-gray-600 mb-4">Load 60+ sample transactions to test the app features and forecasting.</p>
                                    <button
                                        onClick={loadSampleData}
                                        className="px-6 py-3 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700"
                                    >
                                        📥 Load Sample Data
                                    </button>
                                </div>

                                {/* Export Data */}
                                <div className="mb-8 pb-8 border-b">
                                    <h3 className="text-lg font-semibold mb-4">Export Data</h3>
                                    <p className="text-gray-600 mb-4">Download all your transactions, price history, and forecasts as a JSON backup.</p>
                                    <button
                                        onClick={exportData}
                                        className="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700"
                                    >
                                        📤 Export to JSON
                                    </button>
                                </div>

                                {/* Import Data */}
                                <div className="mb-8 pb-8 border-b">
                                    <h3 className="text-lg font-semibold mb-4">Import Data</h3>
                                    <p className="text-gray-600 mb-4">Restore data from a previous backup file.</p>
                                    <input
                                        type="file"
                                        accept=".json"
                                        onChange={importData}
                                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200"
                                    />
                                </div>

                                {/* Clear Data */}
                                <div>
                                    <h3 className="text-lg font-semibold mb-4">Clear All Data</h3>
                                    <p className="text-gray-600 mb-4">Delete all transactions and start fresh. This cannot be undone.</p>
                                    <button
                                        onClick={() => {
                                            if (window.confirm('Are you sure? This will delete all data.')) {
                                                localStorage.clear();
                                                setReceipts([]);
                                                setItems([]);
                                                setPriceHistory({});
                                                setForecasts({});
                                                alert('All data cleared.');
                                            }
                                        }}
                                        className="px-6 py-3 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700"
                                    >
                                        🗑️ Clear All Data
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WiseWallet />);
    </script>
</body>
</html>
